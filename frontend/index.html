<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800">

  <!-- 헤더 -->
  <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center gap-3">
    <span class="text-2xl">📋</span>
    <h1 class="text-xl font-bold tracking-tight">TaskFlow</h1>
    <span class="text-slate-400 text-sm">업무 관리</span>
  </header>

  <!-- 업무 추가 폼 -->
  <div class="max-w-2xl mx-auto mt-8 px-4">
    <form id="task-form" class="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex flex-col gap-3">
      <h2 class="font-semibold text-slate-700">새 업무 추가</h2>
      <input
        id="title"
        type="text"
        placeholder="업무 제목 *"
        required
        class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
      />
      <input
        id="description"
        type="text"
        placeholder="설명 (선택)"
        class="border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
      />
      <button
        type="submit"
        class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold rounded-lg py-2.5 text-sm transition-colors"
      >
        + 추가
      </button>
    </form>
  </div>

  <!-- 칸반 보드 -->
  <main class="max-w-6xl mx-auto mt-8 px-4 pb-12 grid grid-cols-1 md:grid-cols-3 gap-5">

    <!-- 할 일 -->
    <div class="flex flex-col gap-3">
      <div class="flex items-center justify-between px-1">
        <h3 class="font-semibold text-slate-600 uppercase text-xs tracking-widest">할 일</h3>
        <span id="count-todo" class="bg-slate-200 text-slate-600 text-xs font-bold rounded-full px-2 py-0.5">0</span>
      </div>
      <div id="col-todo" class="flex flex-col gap-3 min-h-24"></div>
    </div>

    <!-- 진행 중 -->
    <div class="flex flex-col gap-3">
      <div class="flex items-center justify-between px-1">
        <h3 class="font-semibold text-yellow-600 uppercase text-xs tracking-widest">진행 중</h3>
        <span id="count-in_progress" class="bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full px-2 py-0.5">0</span>
      </div>
      <div id="col-in_progress" class="flex flex-col gap-3 min-h-24"></div>
    </div>

    <!-- 완료 -->
    <div class="flex flex-col gap-3">
      <div class="flex items-center justify-between px-1">
        <h3 class="font-semibold text-green-600 uppercase text-xs tracking-widest">완료</h3>
        <span id="count-done" class="bg-green-100 text-green-700 text-xs font-bold rounded-full px-2 py-0.5">0</span>
      </div>
      <div id="col-done" class="flex flex-col gap-3 min-h-24"></div>
    </div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
